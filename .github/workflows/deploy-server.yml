name: Deploy Server to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy when CI passes
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC → aws-actions/configure-aws-credentials
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if server files changed
        id: paths
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^(server|packages/shared)/'; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.paths.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy via SSM Run Command
        if: steps.paths.outputs.deploy == 'true'
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "set -e",
              "cd /app",
              "git pull origin main",
              "pnpm install --frozen-lockfile",
              "pnpm --filter anydrop-server build",
              "pm2 restart anydrop-server",
              "sleep 3",
              "curl -sf http://localhost:3001/welcome || (echo health-check-failed && exit 1)"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll up to 5 minutes — replaces the 100s CLI waiter default
          STATUS="Pending"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "[StandardOutputContent,StandardErrorContent]" \
                  --output text
                exit 1 ;;
            esac
            sleep 5
          done

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy timed out after 5 minutes"
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[Status,StandardOutputContent,StandardErrorContent]" \
            --output text
