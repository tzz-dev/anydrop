# /etc/nginx/sites-available/anydrop
#
# Prerequisites on EC2:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#   (certbot fills in the ssl_certificate / ssl_certificate_key lines)
#
# After editing:
#   sudo ln -s /etc/nginx/sites-available/anydrop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ws.anydrop.jp;
    # Redirect all HTTP to HTTPS (certbot adds this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ws.anydrop.jp;

    # --- SSL (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/ws.anydrop.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.anydrop.jp/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # --- Signaling server (HTTP REST + WebSocket upgrade) ---
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive longer than the default 60s
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
